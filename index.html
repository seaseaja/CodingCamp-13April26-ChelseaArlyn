<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Expense & Budget Visualizer</h1>
        
        <div class="balance-container">
            <h3>TOTAL BALANCE</h3>
            <h2 id="total-balance">$0.00</h2>
        </div>

        <div class="card">
            <h3>Add Transaction</h3>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="item-name" placeholder="e.g. Cilok" required>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Fun">Fun</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Add Transaction</button>
            </form>
        </div>

        <div class="main-content">
            <div class="card transaction-list">
                <h3>Transactions</h3>
                <ul id="list-items">
                    </ul>
            </div>

            <div class="card chart-container">
                <h3>Spending by Category</h3>
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
